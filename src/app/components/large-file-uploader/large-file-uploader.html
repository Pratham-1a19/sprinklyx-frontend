<div class="uploader-container">
    <h3>Post Media</h3>

    <div class="file-selection">
        <label for="file-upload" class="custom-file-upload">
            <i class="icon-upload"></i> Choose File
        </label>
        <input id="file-upload" type="file" (change)="onFileSelected($event)" accept="video/*,image/*" />
        <span class="file-name" *ngIf="selectedFile">{{ selectedFile.name }} ({{ (selectedFile.size / 1024 /
            1024).toFixed(2) }} MB)</span>
    </div>

    <div class="account-selection" *ngIf="accounts.length > 0">
        <h4>Select Platforms to Post To:</h4>
        <div class="account-list">
            <div *ngFor="let account of accounts" class="account-item"
                [ngClass]="{'selected': selectedAccountIds.includes(account._id)}"
                (click)="toggleAccountSelection(account._id)">
                <span class="platform-name">{{ account.platform | titlecase }}</span>
                <span class="profile-name" *ngIf="account.profileName">{{ account.profileName }}</span>
            </div>
        </div>
    </div>

    <div class="no-accounts" *ngIf="accounts.length === 0">
        <p>No social accounts connected. Please go to <a routerLink="/connect-accounts">Connect Accounts</a> first.</p>
    </div>

    <button class="upload-btn" [disabled]="!selectedFile || selectedAccountIds.length === 0 || isUploading"
        (click)="uploadFile()">
        {{ isUploading ? 'Uploading...' : 'Post Now' }}
    </button>

    <div class="progress-section" *ngIf="isUploading || jobId">
        <div class="progress-bar-container">
            <div class="progress-bar" [style.width.%]="uploadProgress"></div>
        </div>
        <div class="status-text">{{ jobStatus }}</div>
    </div>
</div>
